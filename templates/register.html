{% extends "base.html" %}

{% block title %}Register - CoreIDE{% endblock %}

{% block content %}
<div class="auth-container glass-panel">
    <div class="auth-header">
        <h1>Create Account</h1>
        <p>Start compiling and managing code instantly</p>
    </div>
    
    <form action="{{ url_for('auth.register') }}" method="POST">
        <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="e.g. dev_coder" required autocomplete="username" minlength="3">
        </div>
        
        <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com" required autocomplete="email">
        </div>
        
        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Min. 8 characters" required autocomplete="new-password" minlength="8">
        </div>
        
        <div class="form-group">
            <label for="confirm_password" class="form-label">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="••••••••" required autocomplete="new-password" minlength="8">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.75rem;">Create Workspace</button>
    </form>
    
    <div style="margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: var(--text-muted);">
        Already have a workspace? <a href="/login" style="color: var(--accent-indigo); text-decoration: none; font-weight: 600;">Log In</a>
    </div>
</div>
{% endblock %}
