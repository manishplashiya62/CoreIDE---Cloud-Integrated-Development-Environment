{% extends "base.html" %}

{% block title %}User Profile - CoreIDE{% endblock %}

{% block content %}
<div class="auth-container glass-panel" style="max-width: 500px; margin: 3rem auto; padding: 2.5rem;">
    <div class="auth-header" style="margin-bottom: 2rem;">
        <h1>Account Settings</h1>
        <p>Update your developer profile credentials</p>
    </div>
    
    <form action="{{ url_for('auth.profile') }}" method="POST">
        <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" name="username" class="form-control" value="{{ current_user.username }}" required autocomplete="username">
        </div>
        
        <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" value="{{ current_user.email }}" required autocomplete="email">
        </div>
        
        <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 2rem 0;">
        
        <h3 style="font-size: 0.9rem; font-weight: 700; margin-bottom: 1.25rem; color: var(--accent-indigo); text-transform: uppercase; letter-spacing: 0.05em;">Security Update</h3>
        
        <div class="form-group">
            <label for="current_password" class="form-label">Current Password (Required for any changes)</label>
            <input type="password" id="current_password" name="current_password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
        
        <div class="form-group">
            <label for="new_password" class="form-label">New Password (Leave blank to keep current)</label>
            <input type="password" id="new_password" name="new_password" class="form-control" placeholder="Min. 8 characters" autocomplete="new-password">
        </div>
        
        <div class="form-group">
            <label for="confirm_password" class="form-label">Confirm New Password</label>
            <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="••••••••" autocomplete="new-password">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.75rem;">Save Changes</button>
    </form>
</div>
{% endblock %}
