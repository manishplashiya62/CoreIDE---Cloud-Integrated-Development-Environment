{% extends "base.html" %}

{% block title %}Page Not Found - CoreIDE{% endblock %}

{% block content %}
<div class="auth-container glass-panel" style="text-align: center; max-width: 500px; margin: 6rem auto; padding: 3rem 2.5rem;">
    <h1 style="font-size: 4.5rem; font-weight: 800; background: linear-gradient(135deg, var(--accent-indigo), var(--accent-violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">404</h1>
    <h2 style="font-size: 1.5rem; font-weight: 700; margin: 0.75rem 0;">Page Not Found</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem; line-height: 1.5;">The folder path or routing endpoint you are trying to open could not be located in this IDE workspace.</p>
    <a href="/" class="btn btn-primary" style="width: 100%;">Return to Homepage</a>
</div>
{% endblock %}
