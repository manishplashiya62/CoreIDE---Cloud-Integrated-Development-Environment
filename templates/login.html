{% extends "base.html" %}

{% block title %}Login - CoreIDE{% endblock %}

{% block content %}
<div class="auth-container glass-panel">
    <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Log in to resume your coding workspace</p>
    </div>
    
    <form action="{{ url_for('auth.login', next=request.args.get('next', '')) }}" method="POST">
        <div class="form-group">
            <label for="username_or_email" class="form-label">Username or Email</label>
            <input type="text" id="username_or_email" name="username_or_email" class="form-control" placeholder="Enter username or email" required autocomplete="username">
        </div>
        
        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
        
        <div class="form-group" style="display: flex; align-items: center; gap: 8px; margin-top: 0.5rem;">
            <input type="checkbox" id="remember" name="remember" style="cursor: pointer; width: 15px; height: 15px; accent-color: var(--accent-indigo);">
            <label for="remember" style="font-size: 0.85rem; color: var(--text-muted); cursor: pointer; user-select: none;">Remember this device</label>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.75rem;">Log In</button>
    </form>
    
    <div style="margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: var(--text-muted);">
        Don't have a workspace? <a href="/register" style="color: var(--accent-indigo); text-decoration: none; font-weight: 600;">Register here</a>
    </div>
</div>
{% endblock %}
